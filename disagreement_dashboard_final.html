function sc(s){return s>=0.7?'#2E7D32':s>=0.4?'#E65100':'#C62828'}

function renderStats(d){
  const nova=d.filter(r=>r.winner==='Nova Pro').length,gpt=d.filter(r=>r.winner==='GPT').length,nei=d.filter(r=>r.winner==='Neither').length,avg=d.length?Math.round(d.reduce((a,r)=>a+r.score,0)/d.length*100):0;
  document.getElementById('statsRow').innerHTML=`
    <div class="scard"><div class="sv">${d.length}</div><div class="sl">Shown</div></div>
    <div class="scard"><div class="sv" style="color:#0D47A1">${nova}</div><div class="sl">Nova Pro won</div></div>
    <div class="scard"><div class="sv" style="color:#E65100">${gpt}</div><div class="sl">GPT won</div></div>
    <div class="scard"><div class="sv" style="color:#616161">${nei}</div><div class="sl">Neither correct</div></div>
    <div class="scard"><div class="sv" style="color:${sc(avg/100)}">${avg}%</div><div class="sl">Avg score</div></div>`;
}

document.getElementById('commonQids').innerHTML=COMMON.map(q=>`<span class="common-badge" onclick="document.getElementById('fSearch').value='${q}';render()">${q}</span>`).join('');

function render(){
  const pol=document.getElementById('fPolicy').value,win=document.getElementById('fWinner').value,typ=document.getElementById('fType').value,srch=document.getElementById('fSearch').value.toLowerCase();
  const d=DATA.filter(r=>(!pol||r.policy===pol)&&(!win||r.winner===win)&&(!typ||r.qtype===typ)&&(!srch||r.question.toLowerCase().includes(srch)||r.qid.toLowerCase().includes(srch)));
  renderStats(d);
  document.getElementById('countLbl').textContent=`Showing ${d.length} of ${DATA.length}`;
  document.getElementById('tblBody').innerHTML=d.map(r=>`<tr>
    <td style="font-size:10px;color:#888;white-space:nowrap">${r.qid}</td>
    <td><span class="badge ${pB[r.policy]||''}">${r.policy}</span></td>
    <td><span class="badge ${tB[r.qtype]||''}">${tS[r.qtype]||r.qtype}</span></td>
    <td style="font-size:11px;max-width:200px">${r.question}</td>
    <td><span style="display:inline-flex;align-items:center;font-size:11px"><span class="score-dot" style="background:${sc(r.score)}"></span>${Math.round(r.score*100)}%</span></td>
    <td><span class="badge ${wB[r.winner]||'b-neither'}">${r.winner}</span></td>
    <td class="ans-cell" title="${r.nova}">${r.nova||'—'}</td>
    <td class="ans-cell" title="${r.gpt}">${r.gpt||'—'}</td>
    <td class="ans-cell" title="${r.human}">${r.human||'—'}</td>
  </tr>`).join('');
}
['fPolicy','fWinner','fType'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('fSearch').addEventListener('input',render);
render();
</script>
</body>
</html>
